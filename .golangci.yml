version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errorlint

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/austinroos/sidekick

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: true
