# Sidekick configuration — copy to sidekick.yaml and fill in.
# Secrets use ${VAR} syntax and resolve from environment variables.

github:
  token: ${GITHUB_TOKEN}
  default_repo: "org/repo"
  workflow: "claude-code-action.yml"

connectors:
  linear:
    api_key: ${LINEAR_API_KEY}
    webhook_secret: ${LINEAR_WEBHOOK_SECRET}

automations:
  - name: "linear-issues"
    trigger:
      connector: linear
      on_label: "sidekick"
      context:
        include:
          - title
          - description
          - comments
          - labels
    prompt: |
      Fix the issue described above.
      Ensure all existing tests pass and add new tests if needed.
    notifications:
      - connector: linear
        comment: true
        update_status: true
        status_mapping:
          pr_created: "In Review"
          completed: "Done"
          failed: "Triage"
