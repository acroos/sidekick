services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: sidekick
      POSTGRES_USER: sidekick
      POSTGRES_PASSWORD: sidekick
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidekick"]
      interval: 5s
      timeout: 5s
      retries: 5

  sidekick:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sidekick:sidekick@postgres:5432/sidekick
    volumes:
      - ./sidekick.yaml:/app/sidekick.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
